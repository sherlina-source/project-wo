<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Orders - WO System</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Additional styles for work orders page */
        .workorder-row {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .workorder-row:hover {
            background-color: var(--primary-soft) !important;
        }
        
        .workorder-row.active {
            background-color: var(--primary-soft);
            border-left: 4px solid var(--primary);
        }
        
        .detail-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 25px;
            margin: 15px 0 25px 0;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--primary-light);
            display: none;
            animation: slideDown 0.3s ease;
        }
        
        .detail-card.show {
            display: block;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }
        
        .detail-section {
            background: var(--gray-100);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid var(--primary-soft);
        }
        
        .detail-section h4 {
            color: var(--dark);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--primary-light);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .detail-item {
            display: flex;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .detail-label {
            width: 120px;
            color: var(--gray-600);
            font-weight: 500;
        }
        
        .detail-value {
            flex: 1;
            color: var(--dark);
            font-weight: 500;
        }
        
        .detail-value.empty {
            color: var(--gray-500);
            font-style: italic;
        }
        
        .priority-badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }
        
        .priority-high {
            background: #fde8e8;
            color: var(--danger);
            border: 1px solid #fad1d1;
        }
        
        .priority-medium {
            background: #fff3d6;
            color: var(--warning);
            border: 1px solid #ffebc2;
        }
        
        .priority-low {
            background: var(--primary-soft);
            color: var(--primary-dark);
            border: 1px solid var(--primary-light);
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }
        
        .status-pending {
            background: var(--gray-200);
            color: var(--gray-600);
            border: 1px solid var(--gray-300);
        }
        
        .status-progress {
            background: #fff3d6;
            color: var(--warning);
            border: 1px solid #ffebc2;
        }
        
        .status-completed {
            background: var(--primary-soft);
            color: var(--primary-dark);
            border: 1px solid var(--primary-light);
        }
        
        .close-detail {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--gray-500);
            transition: var(--transition);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        
        .close-detail:hover {
            background: var(--danger);
            color: white;
            transform: rotate(90deg);
        }
        
        .detail-header {
            position: relative;
            margin-bottom: 20px;
            padding-right: 50px;
        }
        
        .detail-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 5px;
        }
        
        .detail-subtitle {
            font-size: 14px;
            color: var(--gray-600);
        }
        
        @media (max-width: 768px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                <span class="logo-icon">📋</span>
                <h2>WO<span>System</span></h2>
            </div>
        </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">Dashboard</span>
                </a>

                <a href="work-orders.html" class="nav-item active">
                    <span class="nav-icon">📋</span>
                    <span class="nav-text">Work Orders</span>
                    <span class="nav-badge" id="woBadge"></span>
                </a>

                <a href="in-progress.html" class="nav-item">
                    <span class="nav-icon">⏳</span>
                    <span class="nav-text">In Progress</span>
                    <span class="nav-badge" id="progressBadge"></span>
                </a>

                <a href="completed.html" class="nav-item">
                    <span class="nav-icon">✅</span>
                    <span class="nav-text">Completed</span>
                    <span class="nav-badge" id="completedBadge"></span>
                </a>

                <div class="nav-divider"></div>

                <a href="notifications.html" class="nav-item">
                    <span class="nav-icon">🔔</span>
                    <span class="nav-text">Notifications</span>
                    <span class="nav-badge" id="notifBadge"></span>
                </a>

                <a href="settings.html" class="nav-item">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-text">Settings</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navigation -->
            <header class="top-bar">
                <button id="sidebarToggle" class="sidebar-toggle">☰</button>

                <div class="page-info">
                    <h1 class="page-title">Work Orders</h1>
                    <div class="breadcrumb">
                        <span class="current">Work Orders</span>
                    </div>
                </div>
                <div class="top-actions">
                    <div class="search-wrapper">
                        <span class="search-icon">🔍</span>
                        <input type="text" placeholder="Cari work order..." class="search-input" id="searchInput">
                    </div>
                    <div class="action-group">
                        <div class="filter-bar">
                            <label>
                                <span style="margin-right: 5px;">📅</span>
                                <input type="date" id="filterDate" class="form-input" style="width: auto;">
                            </label>
                        </div>
                        <div class="notification-wrapper" id="notificationIcon">
                            <span class="notification-icon">🔔</span>
                            <span class="notification-badge" id="notifCount">0</span>
                        </div>
                        <div class="sound-control">
                            <button class="sound-btn" id="soundToggle">🔊</button>
                            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
                        </div>
                    </div>
                </div>
            </header>

            <!-- Work Orders Content -->
            <div class="workorders-container">
                <!-- Stats Cards -->
                <div class="stats-grid" style="margin-bottom: 25px;">
                    <div class="stat-card">
                        <div class="stat-icon">📋</div>
                        <div class="stat-content">
                            <span class="stat-label">Total Work Orders</span>
                            <span class="stat-value" id="totalWO">0</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">⏳</div>
                        <div class="stat-content">
                            <span class="stat-label">In Progress</span>
                            <span class="stat-value" id="inProgressWO">0</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">✅</div>
                        <div class="stat-content">
                            <span class="stat-label">Completed</span>
                            <span class="stat-value" id="completedWO">0</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">⏰</div>
                        <div class="stat-content">
                            <span class="stat-label">Pending</span>
                            <span class="stat-value" id="pendingWO">0</span>
                        </div>
                    </div>
                </div>

                <!-- Filter Tabs -->
                <div class="filter-bar">
                    <div class="filter-tabs">
                        <button class="filter-tab active" data-status="all">All</button>
                        <button class="filter-tab" data-status="1">Pending</button>
                        <button class="filter-tab" data-status="2">In Progress</button>
                        <button class="filter-tab" data-status="3">Completed</button>
                    </div>
                    <div class="filter-actions">
                        <button class="btn btn-outline" id="refreshBtn">
                            <span>🔄</span> Refresh
                        </button>
                    </div>
                </div>

                <!-- Detail Card Container (akan muncul saat row diklik) -->
                <div id="detailCardContainer" style="margin-bottom: 25px; display: none;"></div>

                    <!-- Detail card akan diisi oleh JavaScript -->
                </div>

                <!-- Work Orders Table -->
               <div class="table-container">
                <table class="wo-table">
                    <thead>
                        <tr>
                            <th>ID WO</th>
                            <th>Job Name</th>
                            <th>Department</th>
                            <th>Requestor</th>
                            <th>Tanggal Request</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Detail</th> 
                        </tr>
                    </thead>
                    <tbody id="woTableBody">
                        <!-- Dynamic content from JS -->
                    </tbody>
                </table>
            </div>

                <!-- Pagination -->
                <div class="pagination" id="pagination">
                    <!-- Dynamic pagination -->
                </div>
            </div>

            <!-- Notifications Panel -->
            <div class="notifications-panel" id="notificationsPanel">
                <div class="panel-header">
                    <h4>Notifikasi</h4>
                    <button class="mark-read" id="markAllRead">Tandai dibaca</button>
                </div>
                <div class="panel-body" id="notificationsList">
                    <!-- Notifications will be inserted here -->
                </div>
            </div>
        </main>
    </div>

    <audio id="notificationSound" src="sounds/notification4.wav" preload="auto"></audio>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/main.js"></script>
    <script src="js/workorders.js"></script>
</body>
</html>
