<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - WO System</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                <span class="logo-icon">📋</span>
                <h2>WO<span>System</span></h2>
            </div>
        </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">Dashboard</span>
                </a>

                <a href="work-orders.html" class="nav-item">
                    <span class="nav-icon">📋</span>
                    <span class="nav-text">Work Orders</span>
                    <span class="nav-badge" id="woBadge"></span>
                </a>

                <a href="in-progress.html" class="nav-item">
                    <span class="nav-icon">⏳</span>
                    <span class="nav-text">In Progress</span>
                    <span class="nav-badge" id="progressBadge"></span>
                </a>

                <a href="completed.html" class="nav-item">
                    <span class="nav-icon">✅</span>
                    <span class="nav-text">Completed</span>
                    <span class="nav-badge" id="completedBadge"></span>
                </a>

                <div class="nav-divider"></div>

                <a href="notifications.html" class="nav-item">
                    <span class="nav-icon">🔔</span>
                    <span class="nav-text">Notifications</span>
                    <span class="nav-badge" id="notifBadge"></span>
                </a>

                <a href="settings.html" class="nav-item">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-text">Settings</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navigation -->
            <header class="top-bar">
                <button id="sidebarToggle" class="sidebar-toggle">☰</button>

                <div class="page-info">
                    <h1 class="page-title">Dashboard</h1>
                    <div class="breadcrumb">
                        <span class="current">Dashboard</span>
                    </div>
                </div>
                <div class="top-actions">
                    <div class="search-wrapper">
                        <span class="search-icon">🔍</span>
                        <input type="text" placeholder="Cari work order..." class="search-input" id="searchInput">
                    </div>
                    <div class="action-group">
                        <div class="notification-wrapper" id="notificationIcon">
                            <span class="notification-icon">🔔</span>
                            <span class="notification-badge" id="notifCount">0</span>
                        </div>
                        <div class="sound-control">
                            <button class="sound-btn" id="soundToggle">🔊</button>
                            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
                        </div>
                    </div>
                </div>
            </header>

            <!-- Dashboard Content -->
            <div class="dashboard-container">
                <!-- Stats Cards - 4 kolom -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">📋</div>
                        <div class="stat-content">
                            <span class="stat-label">Total Work Orders</span>
                            <span class="stat-value" id="totalWO">0</span>
                            <span class="stat-trend positive" id="totalTrend">↑ 0%</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">⏳</div>
                        <div class="stat-content">
                            <span class="stat-label">In Progress</span>
                            <span class="stat-value" id="inProgressWO">0</span>
                            <span class="stat-trend" id="progressTrend">0 active</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">✅</div>
                        <div class="stat-content">
                            <span class="stat-label">Completed</span>
                            <span class="stat-value" id="completedWO">0</span>
                            <span class="stat-trend positive" id="completedTrend">0%</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">⏰</div>
                        <div class="stat-content">
                            <span class="stat-label">Pending</span>
                            <span class="stat-value" id="pendingWO">0</span>
                            <span class="stat-trend negative" id="pendingTrend">0 waiting</span>
                        </div>
                    </div>
                </div>

                <!-- Charts Section - 2 kolom -->
                <div class="charts-grid">
                    <div class="chart-card">
                        <div class="card-header">
                            <h3>Work Order Overview</h3>
                            <select class="chart-filter" id="woChartFilter">
                                <option value="week">This Week</option>
                                <option value="month" selected>This Month</option>
                                <option value="year">This Year</option>
                            </select>
                        </div>
                        <div class="chart-body">
                            <canvas id="woChart" style="height: 250px; width: 100%;"></canvas>
                        </div>
                    </div>
                    <div class="chart-card">
                        <div class="card-header">
                            <h3>Priority Distribution</h3>
                        </div>
                        <div class="chart-body">
                            <canvas id="priorityChart" style="height: 250px; width: 100%;"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Notifications Panel -->
            <div class="notifications-panel" id="notificationsPanel">
                <div class="panel-header">
                    <h4>Notifikasi</h4>
                    <button class="mark-read" id="markAllRead">Tandai dibaca</button>
                </div>
                <div class="panel-body" id="notificationsList">
                    <!-- Notifications will be inserted here -->
                </div>
            </div>
        </main>
    </div>

    <audio id="notificationSound" src="sounds/notification4.wav" preload="auto"></audio>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/main.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
